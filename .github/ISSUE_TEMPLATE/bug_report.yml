name: Bug report
description: Report a problem with the nexus-exchange crate.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please search existing issues first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected instead.
      placeholder: Calling `client.…` returned … but I expected …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal code snippet or sequence of calls that triggers the bug.
      render: rust
    validations:
      required: true
  - type: input
    id: crate-version
    attributes:
      label: Crate version
      description: Version of `nexus-exchange` (or git rev) you're using.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: api-version
    attributes:
      label: API spec version
      description: Value of `.api-version` you're targeting, if relevant.
      placeholder: "v0.3.3"
    validations:
      required: false
  - type: input
    id: rust-version
    attributes:
      label: Rust toolchain
      description: Output of `rustc --version`.
      placeholder: "rustc 1.82.0"
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Logs / backtrace
      description: Relevant error output. Set `RUST_BACKTRACE=1` if it's a panic.
      render: text
    validations:
      required: false
