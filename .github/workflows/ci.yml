name: CI

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: CI only needs to read the checked-out tree.
permissions:
  contents: read

# Supersede in-flight runs for the same ref so a force-push doesn't pile up
# redundant jobs. `github.head_ref` is set on PRs, `github.ref` on branch
# pushes; never cancel runs on the default branch.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  fmt:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --locked --all-targets --all-features -- -D warnings

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --locked --all-features

  # Emit a machine-readable line-coverage % for the dashboard. Additive and
  # non-gating: there is no --fail-under threshold, so coverage never blocks a
  # merge. Uses cargo-llvm-cov (LLVM source-based coverage).
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run coverage
        run: |
          cargo llvm-cov --locked --all-features --summary-only --json --output-path coverage.json
          cargo llvm-cov --locked --all-features --summary-only
      - name: Write coverage summary
        run: |
          PCT=$(jq -r '.data[0].totals.lines.percent' coverage.json)
          printf '### Line coverage: %.2f%%\n' "$PCT" >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.json

  docs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      RUSTDOCFLAGS: "-D warnings"
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --locked --no-deps --all-features

  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check pinned API spec version against latest release
        env:
          # The spec lives in a separate repo. GITHUB_TOKEN works when that repo
          # is public or in the same org with read access; otherwise set a
          # SPEC_REPO_TOKEN secret (a PAT with read access to the spec repo).
          GH_TOKEN: ${{ secrets.SPEC_REPO_TOKEN || secrets.GITHUB_TOKEN }}
          SPEC_REPO: nexus-xyz/nexus-exchange-api
        run: |
          set -euo pipefail

          pinned="$(tr -d '[:space:]' < .api-version)"
          if [ -z "$pinned" ]; then
            echo "::error file=.api-version::.api-version is empty"
            exit 1
          fi
          echo "Pinned API spec version: $pinned"

          api="https://api.github.com/repos/${SPEC_REPO}"

          # 1. The pinned version must exist as a release in the spec repo.
          pinned_status="$(curl -sS -o /dev/null -w '%{http_code}' \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api}/releases/tags/${pinned}")"
          if [ "$pinned_status" != "200" ]; then
            echo "::error::Pinned spec version ${pinned} not found as a release in ${SPEC_REPO} (HTTP ${pinned_status}). Cannot verify spec; check the pin in .api-version and that CI can read the spec repo."
            exit 1
          fi

          # 2. Compare the pin to the latest published release.
          latest="$(curl -sS \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api}/releases/latest" | jq -r '.tag_name // empty')"
          if [ -z "$latest" ]; then
            echo "::error::Could not determine latest release of ${SPEC_REPO}."
            exit 1
          fi
          echo "Latest API spec release:  $latest"

          if [ "$pinned" != "$latest" ]; then
            echo "::error::Spec drift: SDK pins ${pinned} but the latest Exchange API spec is ${latest}. Bump .api-version (and the README table) once the SDK is updated for ${latest}."
            exit 1
          fi

          echo "No drift: SDK is pinned to the latest API spec (${pinned})."

  # Guard the floor declared by `rust-version` in Cargo.toml. Cargo.toml is the
  # single source of truth — the toolchain is read from it, never duplicated
  # here, so the two can't drift.
  msrv:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          set -euo pipefail
          version="$(grep -m1 -E '^rust-version[[:space:]]*=' Cargo.toml \
            | sed -E 's/.*"([0-9]+(\.[0-9]+){1,2})".*/\1/')"
          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+){1,2}$ ]]; then
            echo "::error::could not parse rust-version from Cargo.toml (got '$version')"
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "MSRV is $version"
      # Third-party action pinned to a full commit SHA (not @master): an
      # unpinned ref is arbitrary CI code that a retag/compromise could swap.
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: ${{ steps.msrv.outputs.version }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --locked --all-features

  semver:
    name: semver-breaking API changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # `baseline-rev` below diffs against the PR's merge base, so that
          # commit must be in history.
          fetch-depth: 0
      # Detect public-API breaking changes vs the PR's base (main), so each PR is
      # judged only on the delta IT introduces — not on breaks already merged but
      # not yet released (which is why this check used to be red on every PR).
      #
      # Policy: an intentional break is fine AS LONG AS it is DECLARED — a
      # conventional-commit `!` (e.g. `feat!:`) in the PR title, or a
      # `BREAKING CHANGE:` footer in the body — so release-plz computes the right
      # version bump. We fail ONLY on an *undeclared* break. For renames prefer a
      # #[deprecated] alias over removal. See CONTRIBUTING.md
      # ("Compatibility & deprecations").
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # stable
        with:
          toolchain: stable
      - uses: Swatinem/rust-cache@v2
      # Install the CLI directly instead of the wrapper action so this job — not
      # the action — owns interpreting the result. The wrapper exposes no output
      # that separates "ran and found a break" from "the tool itself errored",
      # and its step `outcome` is `failure` in BOTH cases. cargo-semver-checks
      # also exits 1 for both, so the exit code alone can't tell them apart
      # either — we disambiguate on the tool's own structured report below.
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks
      # Run the check, capturing combined output and exit code without aborting
      # the step (we classify the result ourselves in the next step).
      - id: semver
        run: |
          set +e
          cargo semver-checks \
            --baseline-rev "${{ github.event.pull_request.base.sha || 'HEAD~1' }}" \
            2>&1 | tee semver-output.txt
          # Capture the CLI's exit code, not tee's.
          code="${PIPESTATUS[0]}"
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          echo "cargo-semver-checks exited with $code"
      - name: Classify result and require breaking changes to be declared
        if: github.event_name == 'pull_request'
        env:
          EXIT_CODE: ${{ steps.semver.outputs.exit_code }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          # Exit 0: the tool ran and found no breaking change. Done.
          if [ "$EXIT_CODE" = "0" ]; then
            echo "✅ No breaking public-API change vs base."
            exit 0
          fi

          # cargo-semver-checks exits 1 for BOTH a detected break AND its own
          # internal errors (bad baseline rev, build failure, panic, network).
          # Distinguish them on the tool's structured report: a genuine break
          # prints the summary
          #   "semver requires new {major|minor} version: N major and M minor checks failed"
          # whereas an infra/tool error aborts with an `error: …` line and never
          # emits that summary. Anything other than exit 0/1, or exit 1 without
          # the summary, is a tool/infra failure — fail loudly and distinctly so
          # it is NOT misread as an undeclared break (and vice versa).
          if [ "$EXIT_CODE" != "1" ] \
            || ! grep -Eq 'semver requires new (major|minor) version' semver-output.txt; then
            echo "::error::cargo-semver-checks did not run successfully (exit ${EXIT_CODE}); this is a tooling/infra failure, not a detected breaking change. Re-run; if it persists, investigate the baseline fetch / build."
            exit 1
          fi

          # A real break was detected — require it to be declared so release-plz
          # computes the right version bump.
          # Conventional-commit `!` before the colon: feat!:, fix(scope)!:, …
          # Match the type prefix case-insensitively so 'Feat!:'/'Fix!:' count too.
          if printf '%s' "$PR_TITLE" | grep -iqE '^[a-z]+(\([^)]*\))?!:' \
            || printf '%s\n' "$PR_BODY" | grep -q 'BREAKING CHANGE:'; then
            echo "✅ Breaking API change detected AND declared (\`!\` / BREAKING CHANGE)."
            echo "   release-plz will bump the version accordingly."
            exit 0
          fi
          echo "::error::Breaking public-API change detected but NOT declared."
          echo "Mark the PR title as a breaking change (e.g. 'feat!: …') or add a"
          echo "'BREAKING CHANGE:' footer so release-plz bumps the version — or keep"
          echo "compatibility with a #[deprecated] alias instead of removing/renaming."
          exit 1
