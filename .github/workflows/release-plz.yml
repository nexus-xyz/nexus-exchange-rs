name: Release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-plz-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-plz:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Prefer a real PAT / GitHub App token so release-plz's release PRs are
          # authored by that identity and natively trigger the required CI checks.
          # Falls back to the default GITHUB_TOKEN so this workflow is safe to
          # merge BEFORE the RELEASE_PLZ_TOKEN secret exists.
          token: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: MarcoIeni/release-plz-action@v0.5
        env:
          # Once a RELEASE_PLZ_TOKEN (a fine-grained PAT or GitHub App token with
          # contents + pull-requests write) is added as a repo secret, release-plz's
          # PRs will be opened as that identity and trigger required CI natively —
          # eliminating the manual empty-commit hack used to kick CI today. Until
          # then this falls back to the default token (release PRs open, but do not
          # trigger required checks on their own).
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN || secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
