name: Security

# Supply-chain checks via cargo-deny: advisories (RUSTSEC), license policy, and
# source allow-listing. Runs on dependency/config changes and daily so new
# advisories surface even without a code change.

on:
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/security.yml'
  pull_request:
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - 'deny.toml'
      - '.github/workflows/security.yml'
  schedule:
    - cron: '0 6 * * *'

permissions:
  contents: read

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - run: cargo deny check advisories licenses sources
