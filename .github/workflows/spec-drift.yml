name: Spec drift

# Verifies the endpoints the SDK targets (endpoints.txt) all still exist in the
# pinned OpenAPI spec (.api-version), and reports any spec operations not yet
# covered. Fetches the spec from the raw-at-tag URL (uncounted — the release
# asset download_count is reserved as an external adoption signal) and caches
# it by the pinned version so a normal run does no network.

on:
  pull_request:
    paths:
      - '.api-version'
      - 'endpoints.txt'
      - 'scripts/check_spec_drift.py'
      - '.github/workflows/spec-drift.yml'
  push:
    branches: [main]
    paths:
      - '.api-version'
      - 'endpoints.txt'
      - 'scripts/check_spec_drift.py'

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Read pinned spec version
        id: pin
        run: |
          tag="$(cat .api-version)"
          # Validate before it reaches any URL / cache key: a crafted
          # .api-version on a fork PR could otherwise inject into the fetch.
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::.api-version must look like vX.Y.Z (got: '$tag')"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Cache the pinned spec
        id: cache
        uses: actions/cache@v4
        with:
          path: openapi.pinned.json
          key: spec-${{ steps.pin.outputs.tag }}

      - name: Fetch spec (cache miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          # Passed via env (not interpolated into the script) so the tag is
          # data, not code; validated to ^v[0-9.]+$ in the pin step above.
          SPEC_TAG: ${{ steps.pin.outputs.tag }}
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/nexus-xyz/nexus-exchange-api/${SPEC_TAG}/openapi.json" \
            -o openapi.pinned.json

      - name: Check drift
        run: python3 scripts/check_spec_drift.py openapi.pinned.json
