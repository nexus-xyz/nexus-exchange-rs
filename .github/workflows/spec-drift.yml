name: Spec drift

# Verifies, against the pinned OpenAPI spec (.api-version): the endpoints the SDK
# targets (endpoints.txt) all still exist; the REST client code matches that
# list; and a representative set of serde models (src/types.rs) read/write only
# fields the spec still defines. Reports spec operations not yet covered. Fetches
# the spec from the raw-at-tag URL (uncounted — the release asset download_count
# is reserved as an external adoption signal) and caches it by the pinned version
# so a normal run does no network.
#
# Triggered by the spec pin and by the SDK surfaces the check derives from
# (src/rest.rs for the code<->endpoints check, src/types.rs for the model<->spec
# check) so editing a model or a wrapper re-runs drift even when the pin is
# unchanged.

on:
  pull_request:
    paths:
      - '.api-version'
      - 'endpoints.txt'
      - 'scripts/check_spec_drift.py'
      - '.github/workflows/spec-drift.yml'
      - 'src/rest.rs'
      - 'src/types.rs'
  push:
    branches: [main]
    paths:
      - '.api-version'
      - 'endpoints.txt'
      - 'scripts/check_spec_drift.py'
      - 'src/rest.rs'
      - 'src/types.rs'

permissions:
  contents: read

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned spec version
        id: pin
        run: |
          tag="$(cat .api-version)"
          # Validate before it reaches any URL / cache key: a crafted
          # .api-version on a fork PR could otherwise inject into the fetch.
          if [[ ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*$ ]]; then
            echo "::error::.api-version must look like vX.Y.Z (got: '$tag')"
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Cache the pinned spec
        id: cache
        uses: actions/cache@v4
        with:
          path: openapi.pinned.json
          key: spec-${{ steps.pin.outputs.tag }}

      - name: Fetch spec (cache miss only)
        if: steps.cache.outputs.cache-hit != 'true'
        env:
          # Passed via env (not interpolated into the script) so the tag is
          # data, not code; validated to ^v[0-9.]+$ in the pin step above.
          SPEC_TAG: ${{ steps.pin.outputs.tag }}
        run: |
          curl -fsSL \
            "https://raw.githubusercontent.com/nexus-xyz/nexus-exchange-api/${SPEC_TAG}/openapi.json" \
            -o openapi.pinned.json

      - name: Check drift
        run: python3 scripts/check_spec_drift.py openapi.pinned.json
